<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8"/>
    <title>401 - 未授权 | RPT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        html {
            background: #f5f5f5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif;
            color: rgba(0, 0, 0, 0.88);
            line-height: 1.5714;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
            -webkit-font-smoothing: antialiased;
        }

        a {
            color: #e78630;
            text-decoration: none;
            transition: color 0.2s;
        }

        a:hover {
            color: #f5a623;
        }

        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }

        .error-container {
            display: flex;
            align-items: flex-start;
            gap: 48px;
            max-width: 720px;
        }

        /* 左侧插画 */
        .error-illustration {
            flex-shrink: 0;
        }

        .shield {
            position: relative;
            width: 160px;
            height: 180px;
        }

        .shield-body {
            width: 120px;
            height: 140px;
            background: linear-gradient(180deg, #fff7e6 0%, #ffe7ba 100%);
            border-radius: 60px 60px 60px 60px / 20px 20px 80px 80px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 6px 16px -8px rgba(0, 0, 0, 0.08), 0 9px 28px 0 rgba(0, 0, 0, 0.05);
        }

        .shield-lock {
            width: 40px;
            height: 32px;
            background: #e78630;
            border-radius: 6px;
            position: relative;
            margin-top: 16px;
        }

        .shield-lock::before {
            content: "";
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 20px;
            border: 4px solid #e78630;
            border-bottom: none;
            border-radius: 12px 12px 0 0;
        }

        .shield-lock::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
        }

        .shield-circle-1,
        .shield-circle-2 {
            position: absolute;
            border-radius: 50%;
            border: 1.5px dashed #ffd591;
        }

        .shield-circle-1 {
            width: 150px;
            height: 150px;
            top: 15px;
            left: 5px;
            animation: rotate 20s linear infinite;
        }

        .shield-circle-2 {
            width: 130px;
            height: 130px;
            top: 25px;
            left: 15px;
            border-color: #ffe7ba;
            animation: rotate 15s linear infinite reverse;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .dot {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ffc069;
        }

        .dot-1 { top: 0; left: 40px; }
        .dot-2 { bottom: 10px; right: 0; background: #ffd591; width: 6px; height: 6px; }
        .dot-3 { top: 30px; right: 10px; background: #ffe7ba; width: 10px; height: 10px; }

        /* 右侧内容 */
        .error-content {
            padding-top: 8px;
        }

        .error-code {
            font-size: 56px;
            font-weight: 700;
            color: #e78630;
            line-height: 1;
            margin-bottom: 12px;
        }

        .error-title {
            font-size: 24px;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.88);
            margin-bottom: 8px;
        }

        .error-desc {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.45);
            line-height: 1.8;
            margin-bottom: 24px;
        }

        .error-suggestions {
            background: #fff;
            border: 1px solid #f0f0f0;
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 24px;
        }

        .error-suggestions h4 {
            font-size: 14px;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.88);
            margin-bottom: 8px;
        }

        .error-suggestions ul {
            list-style: none;
            padding: 0;
        }

        .error-suggestions li {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.65);
            line-height: 2;
            padding-left: 16px;
            position: relative;
        }

        .error-suggestions li::before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #e78630;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .ant-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 32px;
            padding: 0 16px;
            font-size: 14px;
            font-weight: 400;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            font-family: inherit;
        }

        .ant-btn-primary {
            border: 1px solid #e78630;
            background: #e78630;
            color: #fff;
            box-shadow: 0 2px 0 rgba(231, 134, 48, 0.1);
        }

        .ant-btn-primary:hover {
            background: #f5a623;
            border-color: #f5a623;
            color: #fff;
        }

        .ant-btn-default {
            border: 1px solid #d9d9d9;
            background: #fff;
            color: rgba(0, 0, 0, 0.88);
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.02);
        }

        .ant-btn-default:hover {
            color: #f5a623;
            border-color: #f5a623;
        }

        .footer {
            background: #fff;
            border-top: 1px solid #e8e8e8;
            padding: 24px;
            text-align: center;
        }

        .footer p {
            font-size: 12px;
            color: rgba(0, 0, 0, 0.45);
            line-height: 1.8;
        }

        .footer a {
            color: rgba(0, 0, 0, 0.65);
        }

        .footer a:hover {
            color: #e78630;
        }

        @media (max-width: 600px) {
            .error-container {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 32px;
            }

            .error-suggestions {
                text-align: left;
            }

            .btn-group {
                justify-content: center;
            }

            .shield {
                width: 120px;
                height: 140px;
            }

            .shield-body {
                width: 90px;
                height: 105px;
            }

            .shield-circle-1 {
                width: 112px;
                height: 112px;
                top: 12px;
                left: 4px;
            }

            .shield-circle-2 {
                width: 98px;
                height: 98px;
                top: 19px;
                left: 11px;
            }

            .error-code {
                font-size: 42px;
            }

            .error-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="error-container">
            <div class="error-illustration">
                <div class="shield">
                    <div class="shield-circle-1"></div>
                    <div class="shield-circle-2"></div>
                    <div class="shield-body">
                        <div class="shield-lock"></div>
                    </div>
                    <div class="dot dot-1"></div>
                    <div class="dot dot-2"></div>
                    <div class="dot dot-3"></div>
                </div>
            </div>
            <div class="error-content">
                <div class="error-code">401</div>
                <div class="error-title">Unauthorized</div>
                <p class="error-desc">抱歉，您没有权限访问此页面。服务器拒绝了您的请求。</p>
                <div class="btn-group">
                    <a class="ant-btn ant-btn-primary" href="/">返回首页</a>
                </div>
            </div>
        </div>
    </div>
    <footer class="footer">
        <p><a href="https://github.com/iamlinhui/rpt" target="_blank">GitHub</a></p>
        <p><a href="https://beian.miit.gov.cn" target="_blank"></a></p>
        <p>Copyright &copy; 2026 by Lynn. All Rights Reserved.</p>
    </footer>
</body>
</html>
