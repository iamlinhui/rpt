<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8"/>
    <title>401 - 未授权 | RPT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: #f5f5f5;
            color: rgba(0, 0, 0, 0.88);
        }
        .result {
            text-align: center;
            padding: 48px 32px;
        }
        .result-icon {
            font-size: 72px;
            color: #faad14;
            margin-bottom: 24px;
            line-height: 1;
        }
        .result-title {
            font-size: 24px;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.88);
            margin-bottom: 8px;
        }
        .result-subtitle {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.45);
            margin-bottom: 24px;
            line-height: 1.5714;
        }
        .ant-btn {
            display: inline-flex;
            align-items: center;
            height: 32px;
            padding: 0 16px;
            font-size: 14px;
            font-weight: 400;
            border-radius: 6px;
            border: 1px solid #1677ff;
            background: #1677ff;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            font-family: inherit;
            box-shadow: 0 2px 0 rgba(5, 145, 255, 0.1);
        }
        .ant-btn:hover {
            background: #4096ff;
            border-color: #4096ff;
        }
        .footer {
            position: fixed;
            bottom: 24px;
            left: 0; right: 0;
            text-align: center;
            font-size: 12px;
            color: rgba(0, 0, 0, 0.45);
        }
    </style>
</head>
<body>
    <div class="result">
        <div class="result-icon">
            <svg width="72" height="72" viewBox="0 0 24 24" fill="#faad14"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
        </div>
        <div class="result-title">401 Unauthorized</div>
        <p class="result-subtitle">访问未授权，请检查您的认证信息</p>
        <a class="ant-btn" href="/">返回首页</a>
    </div>
    <div class="footer">
        <p>Copyright &copy; 2026 by Lynn. All Rights Reserved.</p>
    </div>
</body>
</html>
